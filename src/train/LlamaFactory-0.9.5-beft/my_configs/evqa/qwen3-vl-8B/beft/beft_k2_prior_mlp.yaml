### model
model_name_or_path: Qwen/Qwen3-VL-8B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true
flash_attn: fa2

### method
stage: beft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128

# 0.9.5 BEFT names for the old PPL/BEFT prior-head hyperparameters.
beft_hidden_state_offset: 4
beft_prior_loss_factor: 1.0
beft_prior_head_lr: 1.0e-6
beft_prior_modeling: mlp_head
beft_prior_head_num_layers: 2
beft_prior_head_proj_dim: 1024
beft_use_prior_head_loss: true

### dataset
dataset: evqa_beft_k2_prior
template: qwen3_vl_nothink
cutoff_len: 2500
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
packing: false
neat_packing: false

### output
output_dir: saves/qwen3-vl-8b/lora/evqa/beft/beft-k2-prior-mlp-r64-bs8-epoch1-max2048
logging_steps: 10
save_steps: 20000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 64
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 20000
