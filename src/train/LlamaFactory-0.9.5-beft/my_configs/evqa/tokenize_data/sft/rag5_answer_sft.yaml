### model
model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: false
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128

### dataset
dataset: evqa_rag5_answer_sft
template: qwen3_vl_nothink
cutoff_len: 4096
overwrite_cache: true
media_dir: /root/
preprocessing_num_workers: 1
preprocessing_batch_size: 8
dataloader_num_workers: 4
packing: false
neat_packing: false
tokenized_path: /workspace/projects/BERAG/outputs/tokenized/evqa_sft_qwen_sample64000_cutoff4096
max_samples: 64000

### output
output_dir: saves/qwen3-vl-2b/lora/evqa/sft/rag5-answer-sft-r64-bs8-epoch1-max4096
logging_steps: 10
save_steps: 20000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 64
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 20000
